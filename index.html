<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOF Card Assignment Workspace</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#090c13;color:#e2e8f0;font-size:13px}

.app{display:flex;flex-direction:column;height:100vh}

/* STATUS BAR */
.statusbar{flex-shrink:0;background:#0f1320;border-bottom:1px solid #1e2535;padding:6px 14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.statusbar h1{font-size:0.8rem;font-weight:700;color:#f8fafc;white-space:nowrap;margin-right:4px}
.stat{font-size:0.68rem;color:#475569}
.stat b{font-weight:700}
.stat b.g{color:#4ade80} .stat b.w{color:#f59e0b} .stat b.r{color:#f87171} .stat b.b{color:#60a5fa}
.statusbar-actions{margin-left:auto;display:flex;gap:7px}
.sb-act-btn{background:#1e2535;border:1px solid #2d3548;color:#64748b;border-radius:4px;padding:3px 10px;font-size:0.68rem;cursor:pointer}
.sb-act-btn:hover:not(:disabled){border-color:#3b82f6;color:#60a5fa}
.sb-act-btn:disabled{opacity:0.3;cursor:default}
.sb-act-btn.danger{background:#450a0a;border-color:#991b1b;color:#f87171}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden}

/* INVENTORY COLUMNS */
.inv-col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #1e2535;width:240px;flex-shrink:0;background:#0b0e17}
.inv-header{flex-shrink:0;padding:7px 10px;background:#0f1320;border-bottom:1px solid #1e2535;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155}
.inv-search{flex-shrink:0;padding:5px 8px;background:#090c13;border-bottom:1px solid #1e2535}
.inv-search input{width:100%;background:#0f1320;border:1px solid #1e2535;border-radius:4px;color:#94a3b8;padding:4px 8px;font-size:0.72rem}
.inv-search input:focus{outline:none;border-color:#3b82f6}
.inv-filters{flex-shrink:0;padding:4px 8px;background:#090c13;border-bottom:1px solid #1e2535;display:flex;gap:4px;flex-wrap:wrap}
.filt-btn{font-size:0.6rem;padding:2px 7px;border-radius:3px;border:1px solid #1e2535;background:#0f1320;color:#475569;cursor:pointer;transition:all .15s}
.filt-btn.on{background:#1e3a5f;border-color:#3b82f6;color:#60a5fa;font-weight:700}
.inv-list{flex:1;overflow-y:auto}
.inv-list::-webkit-scrollbar{width:3px}
.inv-list::-webkit-scrollbar-thumb{background:#1e2535;border-radius:99px}

/* SECTION HEADERS */
.sec-header{padding:5px 10px;background:#090c13;border-bottom:1px solid #1e2535;border-top:1px solid #1e2535;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;position:sticky;top:0;z-index:2}
.sec-header:hover{background:#0d1020}
.sec-header .sec-count{background:#1e2535;color:#475569;border-radius:99px;padding:1px 6px;font-size:0.58rem}
.sec-header .sec-arrow{margin-left:auto;color:#334155;font-size:0.7rem;transition:transform .2s}
.sec-header.collapsed .sec-arrow{transform:rotate(-90deg)}
.sec-body{transition:none}
.sec-body.hidden{display:none}

/* SET ROWS */
.set-row{padding:6px 10px 6px 13px;border-bottom:1px solid #0d1015;cursor:pointer;transition:background .1s;position:relative;border-left:3px solid transparent}
.set-row:hover{background:#131a27}
.set-row.active-row{background:#1a2540;border-left-color:#3b82f6}
.set-row.sr-critical{border-left-color:#ef4444}
.set-row.sr-predecided{border-left-color:#f59e0b}
.set-row.sr-vs{border-left-color:#3b82f6}
.set-row.sr-locked{border-left-color:#22c55e;opacity:0.7}
.set-row.sr-skipped{opacity:0.4}
.set-row.sr-open{border-left-color:#1e2535}
.sr-name{font-size:0.72rem;font-weight:500;color:#e2e8f0;line-height:1.3;margin-bottom:2px}
.sr-name.dim{color:#475569}
.sr-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sr-badge{font-size:0.58rem;padding:1px 5px;border-radius:3px;font-weight:700;border:1px solid}
.sr-badge.vs{background:#1e3a5f;color:#60a5fa;border-color:#2563eb}
.sr-badge.locked{background:#0f2318;color:#4ade80;border-color:#16a34a}
.sr-badge.critical{background:#450a0a;color:#f87171;border-color:#dc2626}
.sr-badge.predecided{background:#2d1f00;color:#f59e0b;border-color:#d97706}
.sr-badge.skipped{background:#1e2535;color:#475569;border-color:#334155}
.sr-cands{font-size:0.6rem;color:#475569}

/* PLAYER ROWS */
.pl-row{padding:6px 10px 6px 13px;border-bottom:1px solid #0d1015;cursor:pointer;transition:background .1s;position:relative;border-left:3px solid transparent}
.pl-row:hover{background:#131a27}
.pl-row.active-row{background:#1a2540;border-left-color:#3b82f6}
.pl-row.pr-stranded{border-left-color:#ef4444}
.pl-row.pr-lastchance{border-left-color:#f59e0b}
.pl-row.pr-placed{border-left-color:#22c55e;opacity:0.7}
.pl-row.pr-skipped{opacity:0.4}
.pl-row.pr-available{border-left-color:#1e2535}
.pr-name{font-size:0.72rem;font-weight:500;color:#e2e8f0;margin-bottom:2px}
.pr-name.dim{color:#475569}
.pr-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pr-war{font-size:0.6rem;color:#475569}
.pr-sets{font-size:0.6rem}
.pr-sets.r{color:#f87171} .pr-sets.w{color:#f59e0b} .pr-sets.g{color:#4ade80} .pr-sets.d{color:#334155}

/* WORKSPACE */
.workspace{flex:1;display:flex;overflow:hidden}

/* DECISION PANEL */
.dec-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #1e2535;min-height:0}
.dec-header{flex-shrink:0;padding:7px 12px;background:#0f1320;border-bottom:1px solid #1e2535;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;display:flex;align-items:center;gap:8px}
.nav-btn{background:#0f1320;border:1px solid #1e2535;color:#475569;border-radius:4px;padding:2px 8px;font-size:0.68rem;cursor:pointer}
.nav-btn:hover:not(:disabled){border-color:#3b82f6;color:#60a5fa}
.nav-btn:disabled{opacity:0.3;cursor:default}
.dec-scroll{flex:1;overflow-y:auto;padding:16px}
.dec-scroll::-webkit-scrollbar{width:4px}
.dec-scroll::-webkit-scrollbar-thumb{background:#1e2535;border-radius:99px}

/* CANDIDATE CARDS */
.cand-card{background:#131a27;border:1px solid #1e2535;border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px}
.cand-card:hover{border-color:#3b82f6;background:#141e30}
.cand-card.cc-active{border-color:#3b82f6;background:#1a2540}
.cand-card.cc-taken{opacity:0.38;cursor:default}
.cand-card.cc-locked{border-color:#22c55e;background:#0f2318}
.cc-tier{font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:99px;flex-shrink:0;margin-top:1px}
.cc-body{flex:1;min-width:0}
.cc-name{font-size:0.82rem;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.cc-sub{font-size:0.68rem;color:#64748b;margin-bottom:5px}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.cc-tag{font-size:0.58rem;padding:1px 5px;border-radius:3px;font-weight:700;border:1px solid}
.cc-tag.vs{background:#1e3a5f;color:#60a5fa;border-color:#2563eb}
.cc-tag.ftcs{background:#2d1f00;color:#f59e0b;border-color:#d97706}
.cc-tag.war{background:#1a1f2e;color:#64748b;border-color:#2d3548}
.cc-tag.type{background:#131720;color:#475569;border-color:#1e2330}
.cc-conflict{font-size:0.62rem;margin-top:3px}
.cc-conflict.hot{color:#f87171} .cc-conflict.warm{color:#f59e0b} .cc-conflict.ok{color:#475569}
.cc-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.btn-lock{background:#14532d;border:1px solid #16a34a;color:#4ade80;border-radius:5px;padding:4px 10px;font-size:0.68rem;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-lock:hover{background:#166534}
.btn-unlock{background:#450a0a;border:1px solid #dc2626;color:#f87171;border-radius:5px;padding:4px 10px;font-size:0.68rem;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-skip{background:#1e2535;border:1px solid #2d3548;color:#64748b;border-radius:5px;padding:4px 10px;font-size:0.68rem;cursor:pointer;white-space:nowrap}

.dec-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#1e2535;font-size:0.82rem;flex-direction:column;gap:8px;text-align:center;padding:20px}
.dec-empty-icon{font-size:2.5rem}

/* CONSEQUENCE PANEL */
.conseq-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.conseq-scroll{flex:1;overflow-y:auto;padding:10px}
.conseq-scroll::-webkit-scrollbar{width:4px}
.conseq-scroll::-webkit-scrollbar-thumb{background:#1e2535;border-radius:99px}

.cn{background:#131a27;border:1px solid #1e2535;border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;position:relative;padding-left:12px}
.cn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:6px 0 0 6px}
.cn.cn-crit::before{background:#ef4444}
.cn.cn-force::before{background:#a855f7}
.cn.cn-red::before{background:#f59e0b}
.cn.cn-ok::before{background:#22c55e}
.cn:hover{border-color:#3b82f6}
.cn-name{font-size:0.72rem;font-weight:600;color:#e2e8f0;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.cn-type{font-size:0.6rem;color:#334155;margin-bottom:4px}
.cn-badge{font-size:0.58rem;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid;flex-shrink:0}
.cn-badge.crit{background:#450a0a;color:#f87171;border-color:#dc2626}
.cn-badge.force{background:#2d1a2d;color:#c084fc;border-color:#9333ea}
.cn-badge.red{background:#2d1f00;color:#f59e0b;border-color:#d97706}
.cn-cands{margin-top:4px}
.cn-cand-row{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid #0d1015;cursor:pointer}
.cn-cand-row:last-child{border-bottom:none}
.cn-cand-row:hover .cn-cand-name{color:#60a5fa}
.cn-tier{font-size:0.58rem;font-weight:700;padding:1px 5px;border-radius:99px;flex-shrink:0}
.cn-cand-name{font-size:0.68rem;color:#94a3b8;flex:1}
.cn-cand-war{font-size:0.58rem;color:#334155}
.cn-no-cands{font-size:0.65rem;color:#f87171;margin-top:4px}
.cn-clean{font-size:0.68rem;color:#4ade80;padding:12px;text-align:center}

/* Two-level dec panel */
.dec-divider{flex-shrink:0;background:#0f1320;border-top:2px solid #1e2535;border-bottom:1px solid #1e2535;padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#3b82f6}
.dec-divider.hidden{display:none}
.dec-divider-close{margin-left:auto;background:none;border:none;color:#475569;cursor:pointer;font-size:0.85rem;padding:0 2px}
.dec-divider-close:hover{color:#e2e8f0}
.dec-secondary{height:45%;flex-shrink:0;overflow-y:auto;padding:16px;border-top:none;background:#0a0d14}
.dec-secondary.hidden{display:none}
.dec-secondary::-webkit-scrollbar{width:4px}
.dec-secondary::-webkit-scrollbar-thumb{background:#1e2535;border-radius:99px}
.cand-card.cc-drilled{border-color:#f59e0b;background:#1a1700}
.cn-sec-label{font-size:0.58rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:6px 0 4px;margin-top:4px}
.cn-sec-label.crit{color:#ef4444} .cn-sec-label.force{color:#a855f7} .cn-sec-label.red{color:#f59e0b}

/* TIER COLORS */
.tier-A{background:#1a2f1a;color:#4ade80;border:1px solid #16a34a}
.tier-B{background:#1a2535;color:#60a5fa;border:1px solid #2563eb}
.tier-C{background:#2d2010;color:#fb923c;border:1px solid #ea580c}
.tier-D{background:#2d1a2d;color:#c084fc;border:1px solid #9333ea}
.tier-E{background:#2d1a1a;color:#f87171;border:1px solid #dc2626}
</style>
</head>
<body>
<div class="app">

<!-- STATUS BAR -->
<div class="statusbar">
  <h1>⚾ HOF Assignment</h1>
  <div class="stat">Locked: <b id="st-locked" class="b">0</b>/742</div>
  <div class="stat">VS filled: <b id="st-vs" class="b">0</b>/<span id="st-vs-tot">76</span></div>
  <div class="stat">Top-50 WAR: <b id="st-top50" class="b">0</b>/<span id="st-top50-tot">?</span></div>
  <div class="stat">Critical: <b id="st-crit" class="r">0</b></div>
  <div class="stat">Stranded: <b id="st-strand" class="r">0</b></div>
  <div class="statusbar-actions">
    <button class="sb-act-btn" id="undo-btn" disabled>↩ Undo</button>
    <button class="sb-act-btn danger" id="reset-btn">Reset</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SETS INVENTORY -->
  <div class="inv-col" id="sets-col">
    <div class="inv-header">Sets <span id="sets-col-count" style="color:#475569;font-weight:400"></span></div>
    <div class="inv-search"><input type="text" id="sets-search" placeholder="Search sets…"></div>
    <div class="inv-filters">
      <button class="filt-btn on" data-sf="all">All</button>
      <button class="filt-btn" data-sf="vs">VS</button>
      <button class="filt-btn" data-sf="open">Open</button>
      <button class="filt-btn" data-sf="contested">Contested</button>
      <button class="filt-btn" data-sf="critical">Critical</button>
      <button class="filt-btn" data-sf="locked">Locked</button>
    </div>
    <div class="inv-list" id="sets-list"></div>
  </div>

  <!-- PLAYERS INVENTORY -->
  <div class="inv-col" id="players-col">
    <div class="inv-header">Players <span id="pl-col-count" style="color:#475569;font-weight:400"></span></div>
    <div class="inv-search"><input type="text" id="players-search" placeholder="Search players…"></div>
    <div class="inv-filters">
      <button class="filt-btn on" data-pf="all">All</button>
      <button class="filt-btn" data-pf="available">Available</button>
      <button class="filt-btn" data-pf="danger">Danger</button>
      <button class="filt-btn" data-pf="placed">Placed</button>
    </div>
    <div class="inv-list" id="players-list"></div>
  </div>

  <!-- WORKSPACE -->
  <div class="workspace">

    <!-- DECISION PANEL -->
    <div class="dec-panel">
      <div class="dec-header">
        <button class="nav-btn" id="nav-back" disabled>← Back</button>
        <button class="nav-btn" id="nav-fwd" disabled>Fwd →</button>
        <span id="dec-header-label" style="color:#475569">Select a set or player to begin</span>
      </div>
      <div class="dec-primary" id="dec-primary">
        <div class="dec-empty">
          <div class="dec-empty-icon">⚾</div>
          <div style="color:#334155;font-size:0.78rem;line-height:1.5">Select a set from the Sets column<br>or a player from the Players column</div>
        </div>
      </div>
      <div class="dec-divider hidden" id="dec-divider">
        <span id="dec-divider-label">↳</span>
        <button class="dec-divider-close" id="dec-divider-close">✕</button>
      </div>
      <div class="dec-secondary hidden" id="dec-secondary"></div>
    </div>

    <!-- CONSEQUENCE PANEL -->
    <div class="conseq-panel">
      <div class="dec-header" id="conseq-header">Consequences</div>
      <div class="conseq-scroll" id="conseq-panel">
        <div style="color:#334155;font-size:0.7rem;padding:12px;text-align:center">Hover or select a candidate card to see downstream effects</div>
      </div>
    </div>

  </div>
</div>
</div>

// ── STATE ──

// ── HELPERS ──
function isVS(s){ return !!s.vintage_sampler; }

function candidatesForSet(si){
  const s=SETS[si], r=[];
  TIER_ORDER.forEach(t=>(s[t]||[]).forEach(p=>r.push({name:p.name,tier:t,war_rank:p.war_rank,first_tcs:p.first_tcs})));
  return r;
}

function availCands(si){
  return candidatesForSet(si).filter(p=>!lockedPlayers[p.name]&&!locks[si]);
}

function availSetsForPlayer(name){
  return (PI[name]||[]).filter(e=>!locks[e.setIdx]&&!lockedPlayers[name]);
}

function getSetStatus(si){
  if(locks[si]) return 'locked';
  if(skippedSets.has(si)) return 'skipped';
  const ac=candidatesForSet(si).filter(p=>lockedPlayers[p.name]===undefined);
  if(ac.length===0) return 'critical';
  if(ac.length===1) return 'predecided';
  return 'open';
}

function getPlayerStatus(name){
  if(lockedPlayers[name]!==undefined) return 'placed';
  if(skippedPlayers.has(name)) return 'skipped';
  const avail=availSetsForPlayer(name);
  if(avail.length===0) return 'stranded';
  if(avail.length===1) return 'lastchance';
  return 'available';
}

function candPriority(c,si){
  const s=SETS[si];
  return (isVS(s)?-2:0) + TIER_ORDER.indexOf(c.tier) + (c.first_tcs?-0.5:0) + (c.war_rank||9999)/10000;
}

function setOptPriority(e){
  return (e.vs?-2:0) + TIER_ORDER.indexOf(e.tier) + (e.first_tcs?-0.5:0) + (e.war_rank||9999)/10000;
}

function getSuggestion(){
  const crit=Object.keys(SETS).map(Number).filter(i=>getSetStatus(i)==='critical');
  if(crit.length) return {type:'set',key:crit[0],label:`🔴 Critical: ${SETS[crit[0]].set}`};
  const pred=Object.keys(SETS).map(Number).filter(i=>getSetStatus(i)==='predecided');
  if(pred.length) return {type:'set',key:pred[0],label:`⚡ Pre-decided: ${SETS[pred[0]].set}`};
  const strand=Object.keys(PI).filter(n=>getPlayerStatus(n)==='stranded');
  if(strand.length) return {type:'player',key:strand[0],label:`⚠ Stranded: ${strand[0]}`};
  const vsOpen=SETS.map((_,i)=>i).filter(i=>isVS(SETS[i])&&!locks[i]&&!skippedSets.has(i));
  if(vsOpen.length){vsOpen.sort((a,b)=>candidatesForSet(a).filter(p=>!lockedPlayers[p.name]).length - candidatesForSet(b).filter(p=>!lockedPlayers[p.name]).length);return{type:'set',key:vsOpen[0],label:`★ VS: ${SETS[vsOpen[0]].set}`};}
  return null;
}

// ── LOCK / UNLOCK / SKIP ──
function lockCard(si,playerName,tier){
  history.push({locks:JSON.stringify(locks),lp:JSON.stringify(lockedPlayers),ss:[...skippedSets],sp:[...skippedPlayers]});
  locks[si]={playerName,tier};
  lockedPlayers[playerName]=si;
  document.getElementById('undo-btn').disabled=false;
  refreshAll();
}

function unlockCard(si){
  if(!locks[si]) return;
  history.push({locks:JSON.stringify(locks),lp:JSON.stringify(lockedPlayers),ss:[...skippedSets],sp:[...skippedPlayers]});
  delete lockedPlayers[locks[si].playerName];
  delete locks[si];
  document.getElementById('undo-btn').disabled=history.length===0;
  refreshAll();
}

function skipSet(si){
  history.push({locks:JSON.stringify(locks),lp:JSON.stringify(lockedPlayers),ss:[...skippedSets],sp:[...skippedPlayers]});
  skippedSets.add(si);
  document.getElementById('undo-btn').disabled=false;
  refreshAll();
}

function unskipSet(si){ skippedSets.delete(si); refreshAll(); }
function skipPlayer(name){ skippedPlayers.add(name); refreshAll(); }
function unskipPlayer(name){ skippedPlayers.delete(name); refreshAll(); }

function undoLast(){
  if(!history.length) return;
  const prev=history.pop();
  locks=JSON.parse(prev.locks);
  lockedPlayers=JSON.parse(prev.lp);
  skippedSets=new Set(prev.ss);
  skippedPlayers=new Set(prev.sp);
  document.getElementById('undo-btn').disabled=history.length===0;
  refreshAll();
}

// ── NAVIGATION ──
function navigateTo(type,key,label,addToStack=true){
  if(addToStack){
    if(navPos<navStack.length-1) navStack=navStack.slice(0,navPos+1);
    navStack.push({type,key,label});
    navPos=navStack.length-1;
  }
  if(type==='set'){
    activeSetIdx=key; activePlayerName=null; activeCandKey=null;
    renderDecPanel_Set(key);
    renderConseq(null);
  } else if(type==='player'){
    activePlayerName=key; activeSetIdx=null; activeCandKey=null;
    renderDecPanel_Player(key);
    renderConseq(null);
  }
  document.getElementById('dec-header-label').textContent=label;
  document.getElementById('nav-back').disabled=navPos<=0;
  document.getElementById('nav-fwd').disabled=navPos>=navStack.length-1;
  renderSetsList();
  renderPlayersList();
}

function navBack(){
  if(navPos<=0) return;
  navPos--;
  const item=navStack[navPos];
  navigateTo(item.type,item.key,item.label,false);
}
function navFwd(){
  if(navPos>=navStack.length-1) return;
  navPos++;
  const item=navStack[navPos];
  navigateTo(item.type,item.key,item.label,false);
}

// ── RENDER SETS LIST ──
function renderSetsList(){
  const search=setsSearch.toLowerCase();

  // Separate into groups
  const groups={critical:[],predecided:[],vs_open:[],open:[],locked:[],skipped:[]};
  SETS.forEach((s,i)=>{
    if(search && !s.set.toLowerCase().includes(search)) return;
    const st=getSetStatus(i);
    const vs=isVS(s);
    // Apply filter
    if(setFilter==='vs' && !vs) return;
    if(setFilter==='open' && !['open','predecided','critical'].includes(st)) return;
    if(setFilter==='contested' && (candidatesForSet(i).filter(p=>!lockedPlayers[p.name]).length<=1||st==='locked')) return;
    if(setFilter==='critical' && st!=='critical') return;
    if(setFilter==='locked' && st!=='locked') return;

    if(st==='critical') groups.critical.push(i);
    else if(st==='predecided') groups.predecided.push(i);
    else if(st==='open' && vs) groups.vs_open.push(i);
    else if(st==='open') groups.open.push(i);
    else if(st==='locked') groups.locked.push(i);
    else if(st==='skipped') groups.skipped.push(i);
  });

  const total=Object.values(groups).flat().length;
  document.getElementById('sets-col-count').textContent=`(${total})`;

  function makeSetRow(i){
    const s=SETS[i]; const st=getSetStatus(i);
    const isActive=activeSetIdx===i;
    const ac=candidatesForSet(i).filter(p=>lockedPlayers[p.name]===undefined);
    const rowClass=st==='critical'?'sr-critical':st==='predecided'?'sr-predecided':st==='locked'?'sr-locked':st==='skipped'?'sr-skipped':isVS(s)?'sr-vs':'sr-open';
    const badges=[];
    if(isVS(s)) badges.push('<span class="sr-badge vs">VS</span>');
    if(st==='locked') badges.push(`<span class="sr-badge locked">✓ ${locks[i].playerName.split(' ').slice(-1)[0]}</span>`);
    if(st==='critical') badges.push('<span class="sr-badge critical">Critical</span>');
    if(st==='predecided') badges.push('<span class="sr-badge predecided">1 left</span>');
    if(st==='skipped') badges.push('<span class="sr-badge skipped">Skipped</span>');
    const candStr=st==='locked'||st==='skipped'||st==='critical'?'':` · ${ac.length} cand`;
    return `<div class="set-row ${rowClass} ${isActive?'active-row':''}" data-si="${i}">
      <div class="sr-name ${st==='skipped'?'dim':''}">${s.set}</div>
      <div class="sr-meta">${badges.join('')}<span class="sr-cands">${candStr}</span></div>
    </div>`;
  }

  function makeSection(id,label,color,items,icon=''){
    if(items.length===0) return '';
    const collapsed=collapsedSections.has(id);
    return `<div>
      <div class="sec-header ${collapsed?'collapsed':''}" data-sec="${id}" style="color:${color}">
        ${icon}${label}<span class="sec-count">${items.length}</span>
        <span class="sec-arrow">▾</span>
      </div>
      <div class="sec-body ${collapsed?'hidden':''}" data-sec-body="${id}">
        ${items.map(makeSetRow).join('')}
      </div>
    </div>`;
  }

  document.getElementById('sets-list').innerHTML=
    makeSection('critical','Critical','#ef4444',groups.critical,'🔴 ')+
    makeSection('predecided','Pre-decided','#f59e0b',groups.predecided,'⚡ ')+
    makeSection('vs_open','VS Open','#60a5fa',groups.vs_open,'★ ')+
    makeSection('open','Open','#475569',groups.open,'')+
    makeSection('locked','Locked','#4ade80',groups.locked,'✓ ')+
    makeSection('skipped','Skipped','#334155',groups.skipped,'');

  const setsList = document.getElementById('sets-list');
  setsList.querySelectorAll('.set-row[data-si]').forEach(el=>{
    el.addEventListener('click',()=>{
      const i=parseInt(el.dataset.si);
      navigateTo('set',i,SETS[i].set);
    });
  });
  setsList.querySelectorAll('.sec-header[data-sec]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id=el.dataset.sec;
      if(collapsedSections.has(id)) collapsedSections.delete(id);
      else collapsedSections.add(id);
      el.classList.toggle('collapsed');
      const body=el.parentElement.querySelector(`[data-sec-body="${id}"]`);
      if(body) body.classList.toggle('hidden');
    });
  });
}

// ── RENDER PLAYERS LIST ──
function renderPlayersList(){
  const search=playersSearch.toLowerCase();
  const allNames=Object.keys(PI).sort((a,b)=>{
    const wa=PI[a][0]?.war_rank||9999, wb=PI[b][0]?.war_rank||9999;
    return wa-wb||a.localeCompare(b);
  });

  const groups={stranded:[],lastchance:[],available:[],placed:[],skipped:[]};
  allNames.forEach(name=>{
    if(search&&!name.toLowerCase().includes(search)) return;
    const st=getPlayerStatus(name);
    if(playerFilter==='available'&&!['available','lastchance'].includes(st)) return;
    if(playerFilter==='danger'&&!['stranded','lastchance'].includes(st)) return;
    if(playerFilter==='placed'&&st!=='placed') return;
    groups[st]?.push(name);
  });

  const total=Object.values(groups).flat().length;
  document.getElementById('pl-col-count').textContent=`(${total})`;

  function makePlayerRow(name){
    const st=getPlayerStatus(name);
    const isActive=activePlayerName===name;
    const wr=PI[name][0]?.war_rank;
    const avail=availSetsForPlayer(name).length;
    const rowClass=st==='stranded'?'pr-stranded':st==='lastchance'?'pr-lastchance':st==='placed'?'pr-placed':st==='skipped'?'pr-skipped':'pr-available';
    const setsColor=st==='stranded'?'r':st==='lastchance'?'w':st==='placed'?'g':'';
    const setsText=st==='placed'?`✓ ${SETS[lockedPlayers[name]]?.set?.substring(0,18)||''}`:st==='stranded'?'No sets left':st==='skipped'?'Skipped':`${avail} set${avail!==1?'s':''}`;
    return `<div class="pl-row ${rowClass} ${isActive?'active-row':''}" data-pname="${name.replace(/"/g,'&quot;')}">
      <div class="pr-name ${st==='skipped'?'dim':''}">${name}</div>
      <div class="pr-meta">
        <span class="pr-war">${wr?'#'+wr:'Unranked'}</span>
        <span class="pr-sets ${setsColor}">${setsText}</span>
      </div>
    </div>`;
  }

  function makeSection(id,label,color,items,icon=''){
    if(!items.length) return '';
    const collapsed=collapsedSections.has('p_'+id);
    return `<div>
      <div class="sec-header ${collapsed?'collapsed':''}" data-sec="p_${id}" style="color:${color}">
        ${icon}${label}<span class="sec-count">${items.length}</span>
        <span class="sec-arrow">▾</span>
      </div>
      <div class="sec-body ${collapsed?'hidden':''}" data-sec-body="p_${id}">
        ${items.map(makePlayerRow).join('')}
      </div>
    </div>`;
  }

  document.getElementById('players-list').innerHTML=
    makeSection('stranded','Stranded','#ef4444',groups.stranded,'🔴 ')+
    makeSection('lastchance','Last Chance','#f59e0b',groups.lastchance,'⚠ ')+
    makeSection('available','Available','#475569',groups.available,'')+
    makeSection('placed','Placed','#4ade80',groups.placed,'✓ ')+
    makeSection('skipped','Skipped','#334155',groups.skipped,'');

  const playersList = document.getElementById('players-list');
  playersList.querySelectorAll('.pl-row[data-pname]').forEach(el=>{
    el.addEventListener('click',()=>navigateTo('player',el.dataset.pname,el.dataset.pname));
  });
  playersList.querySelectorAll('.sec-header[data-sec]').forEach(el=>{
    el.addEventListener('click',(e)=>{
      e.stopPropagation();
      const id=el.dataset.sec;
      if(collapsedSections.has(id)) collapsedSections.delete(id);
      else collapsedSections.add(id);
      el.classList.toggle('collapsed');
      const body=el.parentElement.querySelector(`[data-sec-body="${id}"]`);
      if(body) body.classList.toggle('hidden');
    });
  });
}

// ── RENDER DECISION PANEL — SET MODE ──
function renderDecPanel_Set(si){
  const panel=document.getElementById('dec-primary');
  clearSecondary();
  const s=SETS[si];
  const st=getSetStatus(si);
  const allCands=candidatesForSet(si);
  const availableNow=allCands.filter(p=>lockedPlayers[p.name]===undefined);
  const sorted=[...availableNow].sort((a,b)=>candPriority(a,si)-candPriority(b,si));
  const takenCands=allCands.filter(p=>lockedPlayers[p.name]!==undefined&&lockedPlayers[p.name]!==si);

  let banner='';
  if(st==='locked') banner=`<div style="background:#0f2318;border:1px solid #16a34a;border-radius:6px;padding:8px 11px;margin-bottom:12px;font-size:0.72rem;color:#4ade80;font-weight:600">✓ Locked — ${locks[si].playerName} (Tier ${locks[si].tier})<button class="btn-unlock" style="margin-left:10px" data-unlock="${si}">Unlock</button></div>`;
  if(st==='critical') banner=`<div style="background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:8px 11px;margin-bottom:12px;font-size:0.72rem;color:#f87171;font-weight:600">🔴 Critical — all candidates have been taken by other sets</div>`;

  const vsBadge=isVS(s)?'<span class="cc-tag vs">VS</span>':'';

  function makeCandCard(c,locked=false,taken=false){
    const isLockedHere=locked;
    const conflict=availableNow.filter(cc=>cc.name!==c.name).length;
    const altSets=availSetsForPlayer(c.name).filter(e=>e.setIdx!==si).length;
    const conflictClass=conflict===0?'ok':conflict<=2?'warm':'ok';
    const conflictText=taken?`Placed in: ${SETS[lockedPlayers[c.name]]?.set?.substring(0,24)}`
      :isLockedHere?'Locked here'
      :`${conflict} other candidate${conflict!==1?'s':''} · ${altSets} other set${altSets!==1?'s':''} for player`;
    const tags=[];
    if(isVS(s)) tags.push('<span class="cc-tag vs">VS</span>');
    if(c.first_tcs) tags.push('<span class="cc-tag ftcs">★ First TCS</span>');
    if(c.war_rank) tags.push(`<span class="cc-tag war">#${c.war_rank} WAR</span>`);
    tags.push(`<span class="cc-tag type">${s.type}</span>`);
    const isActiveCard=activeCandKey&&activeCandKey.setIdx===si&&activeCandKey.playerName===c.name;
    let actions='';
    if(isLockedHere) actions=`<button class="btn-unlock" data-unlock="${si}">Unlock</button>`;
    else if(!taken&&st!=='locked'){
      actions=`<button class="btn-lock" data-lock-si="${si}" data-lock-pn="${c.name.replace(/"/g,'&quot;')}" data-lock-tier="${c.tier}">Lock</button>`;
    }
    return `<div class="cand-card ${isLockedHere?'cc-locked':taken?'cc-taken':isActiveCard?'cc-active':''}" data-cand-si="${si}" data-cand-pn="${c.name.replace(/"/g,'&quot;')}" data-cand-tier="${c.tier}">
      <span class="cc-tier tier-${c.tier}">${c.tier}</span>
      <div class="cc-body">
        <div class="cc-name">${c.name}</div>
        <div class="cc-tags">${tags.join('')}</div>
        <div class="cc-conflict ${conflictClass}">${conflictText}</div>
      </div>
      <div class="cc-actions">${actions}
        ${!taken&&!isLockedHere&&st!=='locked'?`<button class="btn-skip" data-skip-si="${si}">Skip set</button>`:''}
      </div>
    </div>`;
  }

  let html=`${banner}
    <div style="font-size:0.7rem;color:#64748b;margin-bottom:4px">${s.type}${isVS(s)?' · <span style="color:#60a5fa">Vintage Sampler</span>':''}</div>
    <div style="font-size:1.1rem;font-weight:800;color:#f8fafc;margin-bottom:12px">${s.set}</div>`;

  if(st!=='critical'){
    if(st==='locked'){
      const lk=locks[si];
      const lc={name:lk.playerName,tier:lk.tier,war_rank:PI[lk.playerName]?.[0]?.war_rank,first_tcs:PI[lk.playerName]?.find(e=>e.setIdx===si)?.first_tcs};
      html+=`<div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;margin-bottom:8px">Locked Card</div>`;
      html+=makeCandCard(lc,true,false);
      if(takenCands.length) html+=`<div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;margin:12px 0 8px">Other candidates (placed elsewhere)</div>${takenCands.map(c=>makeCandCard(c,false,true)).join('')}`;
    } else {
      html+=`<div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;margin-bottom:8px">Candidates — ${sorted.length} available</div>`;
      html+=sorted.map(c=>makeCandCard(c,false,false)).join('');
      if(takenCands.length) html+=`<div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;margin:12px 0 8px">Placed elsewhere</div>${takenCands.map(c=>makeCandCard(c,false,true)).join('')}`;
    }
  }

  panel.innerHTML=html;
  wireDecPanel(panel);
}

// ── RENDER DECISION PANEL — PLAYER MODE ──
function renderDecPanel_Player(name){
  const panel=document.getElementById('dec-primary');
  clearSecondary();
  const st=getPlayerStatus(name);
  const entries=(PI[name]||[]).sort((a,b)=>setOptPriority(a)-setOptPriority(b));
  const wr=PI[name]?.[0]?.war_rank;

  let banner='';
  if(st==='placed') banner=`<div style="background:#0f2318;border:1px solid #16a34a;border-radius:6px;padding:8px 11px;margin-bottom:12px;font-size:0.72rem;color:#4ade80;font-weight:600">✓ Placed in: ${SETS[lockedPlayers[name]]?.set}</div>`;
  if(st==='stranded') banner=`<div style="background:#450a0a;border:1px solid #dc2626;border-radius:6px;padding:8px 11px;margin-bottom:12px;font-size:0.72rem;color:#f87171;font-weight:600">⚠ Stranded — all sets taken</div>`;

  function makeSetOptCard(e){
    const s=SETS[e.setIdx];
    const setSt=getSetStatus(e.setIdx);
    const setTaken=setSt==='locked'&&locks[e.setIdx]?.playerName!==name;
    const playerTaken=st==='placed'&&lockedPlayers[name]!==e.setIdx;
    const taken=setTaken||playerTaken;
    const isLockedHere=locks[e.setIdx]?.playerName===name;
    const compCount=candidatesForSet(e.setIdx).filter(p=>p.name!==name&&lockedPlayers[p.name]===undefined).length;
    const tags=[];
    if(e.vs) tags.push('<span class="cc-tag vs">VS</span>');
    if(e.first_tcs) tags.push('<span class="cc-tag ftcs">★ First TCS</span>');
    if(e.war_rank) tags.push(`<span class="cc-tag war">#${e.war_rank} WAR</span>`);
    tags.push(`<span class="cc-tag type">${e.type}</span>`);
    const conflictText=isLockedHere?'Locked here':taken?`${setTaken?'Set taken by '+locks[e.setIdx]?.playerName:'Player placed elsewhere'}`:
      `${compCount} other candidate${compCount!==1?'s':''} for this set`;
    const conflictClass=compCount===0&&!taken&&!isLockedHere?'ok':compCount<=2?'warm':'ok';
    const isActiveCard=activeCandKey&&activeCandKey.setIdx===e.setIdx&&activeCandKey.playerName===name;
    let actions='';
    if(isLockedHere) actions=`<button class="btn-unlock" data-unlock="${e.setIdx}">Unlock</button>`;
    else if(!taken) actions=`<button class="btn-lock" data-lock-si="${e.setIdx}" data-lock-pn="${name.replace(/"/g,'&quot;')}" data-lock-tier="${e.tier}">Lock</button>`;
    return `<div class="cand-card ${isLockedHere?'cc-locked':taken?'cc-taken':isActiveCard?'cc-active':''}" data-cand-si="${e.setIdx}" data-cand-pn="${name.replace(/"/g,'&quot;')}" data-cand-tier="${e.tier}">
      <span class="cc-tier tier-${e.tier}">${e.tier}</span>
      <div class="cc-body">
        <div class="cc-name">${s.set}</div>
        <div class="cc-tags">${tags.join('')}</div>
        <div class="cc-conflict ${conflictClass}">${conflictText}</div>
      </div>
      <div class="cc-actions">${actions}</div>
    </div>`;
  }

  panel.innerHTML=`${banner}
    <div style="font-size:0.7rem;color:#64748b;margin-bottom:4px">${wr?'WAR Rank #'+wr:'Unranked'} · ${entries.length} set appearance${entries.length!==1?'s':''}</div>
    <div style="font-size:1.1rem;font-weight:800;color:#f8fafc;margin-bottom:12px">${name}</div>
    <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#334155;margin-bottom:8px">Set Options — sorted by priority</div>
    ${entries.map(makeSetOptCard).join('')}`;

  wireDecPanel(panel);
}

function wireDecPanel(panel, isPrimary=true){
  // Lock buttons
  panel.querySelectorAll('.btn-lock[data-lock-si]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();lockCard(parseInt(btn.dataset.lockSi),btn.dataset.lockPn,btn.dataset.lockTier);});
  });
  panel.querySelectorAll('.btn-unlock[data-unlock]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();unlockCard(parseInt(btn.dataset.unlock));});
  });
  panel.querySelectorAll('.btn-skip[data-skip-si]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();skipSet(parseInt(btn.dataset.skipSi));});
  });
  // Candidate click -> consequences + drill-down in secondary
  panel.querySelectorAll('.cand-card:not(.cc-taken)').forEach(card=>{
    card.addEventListener('click',e=>{
      if(e.target.closest('.btn-lock,.btn-unlock,.btn-skip')) return;
      const si=parseInt(card.dataset.candSi);
      const pn=card.dataset.candPn;
      const tier=card.dataset.candTier;
      activeCandKey={setIdx:si,playerName:pn,tier};
      renderConseq({setIdx:si,playerName:pn,tier});

      // Mark active card
      panel.querySelectorAll('.cand-card').forEach(c=>c.classList.remove('cc-active','cc-drilled'));
      card.classList.add('cc-drilled');

      if(isPrimary){
        // Drill: if in set mode, show that player's other sets
        //        if in player mode, show that set's other candidates
        if(activeSetIdx!==null){
          // set mode: show player's other sets below
          renderSecondary_PlayerSets(pn, si);
        } else if(activePlayerName!==null){
          // player mode: show set's other candidates below
          renderSecondary_SetCands(si, pn);
        }
      }
    });
  });
}

// ── SECONDARY PANEL ──
function clearSecondary(){
  document.getElementById('dec-secondary').classList.add('hidden');
  document.getElementById('dec-secondary').innerHTML='';
  document.getElementById('dec-divider').classList.add('hidden');
}

function showSecondary(label, html){

  const div=document.getElementById('dec-divider');
  document.getElementById('dec-divider-label').textContent='↳ '+label;
  div.classList.remove('hidden');
  sec.classList.remove('hidden');

  wireDecPanel(sec, false);

  setTimeout(()=>{ document.getElementById('dec-primary').scrollTop=99999; },50);

// Secondary: player's other set options (when in set mode, clicked a player)
function renderSecondary_PlayerSets(playerName, currentSetIdx){
  const entries=(PI[playerName]||[]).sort((a,b)=>setOptPriority(a)-setOptPriority(b));
  const others=entries.filter(e=>e.setIdx!==currentSetIdx);
  if(!others.length){
    showSecondary(`${playerName} — no other sets`, '<div style="color:#334155;font-size:0.72rem;padding:8px">This player appears in no other sets.</div>');
    return;
  }
  const wr=PI[playerName]?.[0]?.war_rank;
  const warStr=wr?`#${wr} WAR`:'Unranked';

  function makeSetOptCard(e){
    const s=SETS[e.setIdx];
    const setSt=getSetStatus(e.setIdx);
    const setLocked=setSt==='locked';
    const setTakenByOther=setLocked&&locks[e.setIdx]?.playerName!==playerName;
    const playerPlaced=lockedPlayers[playerName]!==undefined&&lockedPlayers[playerName]!==e.setIdx;
    const taken=setTakenByOther||playerPlaced;
    const isLockedHere=locks[e.setIdx]?.playerName===playerName;
    const compCount=candidatesForSet(e.setIdx).filter(p=>p.name!==playerName&&lockedPlayers[p.name]===undefined).length;
    const tags=[];
    if(e.vs) tags.push('<span class="cc-tag vs">VS</span>');
    if(e.first_tcs) tags.push('<span class="cc-tag ftcs">★ First TCS</span>');
    if(e.war_rank) tags.push(`<span class="cc-tag war">#${e.war_rank} WAR</span>`);
    tags.push(`<span class="cc-tag type">${e.type}</span>`);
    const conflictText=isLockedHere?'Locked here':taken?(setTakenByOther?`Set taken by ${locks[e.setIdx]?.playerName}`:'Player placed elsewhere'):`${compCount} other candidate${compCount!==1?'s':''} for this set`;
    const conflictClass=compCount===0&&!taken&&!isLockedHere?'ok':compCount<=2?'warm':'ok';
    let actions='';
    if(isLockedHere) actions=`<button class="btn-unlock" data-unlock="${e.setIdx}">Unlock</button>`;
    else if(!taken) actions=`<button class="btn-lock" data-lock-si="${e.setIdx}" data-lock-pn="${playerName.replace(/"/g,'&quot;')}" data-lock-tier="${e.tier}">Lock</button>`;
    const isActiveCard=activeCandKey&&activeCandKey.setIdx===e.setIdx&&activeCandKey.playerName===playerName;
    return `<div class="cand-card ${isLockedHere?'cc-locked':taken?'cc-taken':isActiveCard?'cc-active':''}" data-cand-si="${e.setIdx}" data-cand-pn="${playerName.replace(/"/g,'&quot;')}" data-cand-tier="${e.tier}">
      <span class="cc-tier tier-${e.tier}">${e.tier}</span>
      <div class="cc-body">
        <div class="cc-name">${s.set}</div>
        <div class="cc-tags">${tags.join('')}</div>
        <div class="cc-conflict ${conflictClass}">${conflictText}</div>
      </div>
      <div class="cc-actions">${actions}</div>
    </div>`;
  }

  const html=`<div style="font-size:0.7rem;color:#64748b;margin-bottom:12px">${warStr} · ${others.length} other set${others.length!==1?'s':''}</div>`+others.map(makeSetOptCard).join('');
  showSecondary(`${playerName} — other sets`, html);
}

// Secondary: set's other candidates (when in player mode, clicked a set)
function renderSecondary_SetCands(setIdx, currentPlayerName){
  const s=SETS[setIdx];
  const allCands=candidatesForSet(setIdx);
  const others=allCands.filter(c=>c.name!==currentPlayerName);
  if(!others.length){
    showSecondary(`${s.set} — no other candidates`, '<div style="color:#334155;font-size:0.72rem;padding:8px">No other candidates for this set.</div>');
    return;
  }
  const sorted=[...others].sort((a,b)=>candPriority(a,setIdx)-candPriority(b,setIdx));

  function makeCandCard(c){
    const taken=lockedPlayers[c.name]!==undefined&&lockedPlayers[c.name]!==setIdx;
    const isLockedHere=locks[setIdx]?.playerName===c.name;
    const setLocked=locks[setIdx]!==undefined;
    const conflict=allCands.filter(cc=>cc.name!==c.name&&lockedPlayers[cc.name]===undefined).length;
    const altSets=availSetsForPlayer(c.name).filter(e=>e.setIdx!==setIdx).length;
    const tags=[];
    if(isVS(s)) tags.push('<span class="cc-tag vs">VS</span>');
    if(c.first_tcs) tags.push('<span class="cc-tag ftcs">★ First TCS</span>');
    if(c.war_rank) tags.push(`<span class="cc-tag war">#${c.war_rank} WAR</span>`);
    tags.push(`<span class="cc-tag type">${s.type}</span>`);
    const conflictText=taken?`Placed in: ${SETS[lockedPlayers[c.name]]?.set?.substring(0,24)}`:isLockedHere?'Locked here':`${conflict} other candidate${conflict!==1?'s':''} · ${altSets} other set${altSets!==1?'s':''} for player`;
    const conflictClass=conflict===0?'ok':conflict<=2?'warm':'ok';
    let actions='';
    if(isLockedHere) actions=`<button class="btn-unlock" data-unlock="${setIdx}">Unlock</button>`;
    else if(!taken&&!setLocked) actions=`<button class="btn-lock" data-lock-si="${setIdx}" data-lock-pn="${c.name.replace(/"/g,'&quot;')}" data-lock-tier="${c.tier}">Lock</button>`;
    const isActiveCard=activeCandKey&&activeCandKey.setIdx===setIdx&&activeCandKey.playerName===c.name;
    return `<div class="cand-card ${isLockedHere?'cc-locked':taken?'cc-taken':isActiveCard?'cc-active':''}" data-cand-si="${setIdx}" data-cand-pn="${c.name.replace(/"/g,'&quot;')}" data-cand-tier="${c.tier}">
      <span class="cc-tier tier-${c.tier}">${c.tier}</span>
      <div class="cc-body">
        <div class="cc-name">${c.name}</div>
        <div class="cc-tags">${tags.join('')}</div>
        <div class="cc-conflict ${conflictClass}">${conflictText}</div>
      </div>
      <div class="cc-actions">${actions}</div>
    </div>`;
  }

  const html=`<div style="font-size:0.7rem;color:#64748b;margin-bottom:12px">${sorted.length} other candidate${sorted.length!==1?'s':''}</div>`+sorted.map(makeCandCard).join('');
  showSecondary(`${s.set} — other candidates`, html);
}

// ── RENDER CONSEQUENCES ──
function renderConseq(cand){
  const panel=document.getElementById('conseq-panel');
  const header=document.getElementById('conseq-header');

  if(!cand){
    header.textContent='Consequences';
    panel.innerHTML='<div style="color:#334155;font-size:0.7rem;padding:12px;text-align:center">Click a candidate card to see downstream effects</div>';
    return;
  }

  const {setIdx,playerName}=cand;
  header.textContent=`If: ${playerName.split(' ').slice(-1)[0]} → ${SETS[setIdx].set.substring(0,18)}`;

  // Simulate
  const hypLP={...lockedPlayers,[playerName]:setIdx};

  const affected=[];
  (PI[playerName]||[]).forEach(entry=>{
    if(entry.setIdx===setIdx) return;
    const before=candidatesForSet(entry.setIdx).filter(p=>lockedPlayers[p.name]===undefined);
    const after=candidatesForSet(entry.setIdx).filter(p=>!hypLP[p.name]);
    if(before.length===after.length) return;
    affected.push({
      setIdx:entry.setIdx, setName:entry.set, type:entry.type, vs:entry.vs,
      before:before.length, after:after.length,
      cands:after.sort((a,b)=>candPriority(a,entry.setIdx)-candPriority(b,entry.setIdx))
    });
  });

  if(!affected.length){
    panel.innerHTML='<div class="cn-clean">✓ Clean lock — no other sets affected</div>';
    return;
  }

  const critical=affected.filter(a=>a.after===0);
  const forced=affected.filter(a=>a.after===1&&a.before>1);
  const reduced=affected.filter(a=>a.after>1);

  function makeCN(item){
    const cls=item.after===0?'cn-crit':item.after===1&&item.before>1?'cn-force':'cn-red';
    const badgeCls=item.after===0?'crit':item.after===1&&item.before>1?'force':'red';
    const badgeText=item.after===0?'Critical':item.after===1&&item.before>1?'Forced':`${item.before}→${item.after}`;
    const vsBadge=item.vs?'<span class="cc-tag vs" style="font-size:0.55rem">VS</span>':'';
    const candsHtml=item.cands.slice(0,4).map(c=>`
      <div class="cn-cand-row" data-cn-si="${item.setIdx}" data-cn-pn="${c.name.replace(/"/g,'&quot;')}" data-cn-tier="${c.tier}">
        <span class="cn-tier tier-${c.tier}">${c.tier}</span>
        <span class="cn-cand-name">${c.name}</span>
        <span class="cn-cand-war">${c.war_rank?'#'+c.war_rank:''}</span>
        ${c.first_tcs?'<span style="color:#f59e0b;font-size:0.58rem">★</span>':''}
      </div>`).join('');
    const more=item.cands.length>4?`<div style="font-size:0.58rem;color:#334155;padding:2px 0">+${item.cands.length-4} more</div>`:'';
    return `<div class="cn ${cls}" data-cn-nav="${item.setIdx}">
      <div class="cn-name">${item.setName} ${vsBadge}<span class="cn-badge ${badgeCls}">${badgeText}</span></div>
      <div class="cn-type">${item.type}</div>
      ${item.after===0?'<div class="cn-no-cands">No candidates will remain</div>':
        `<div class="cn-cands">${candsHtml}${more}</div>`}
    </div>`;
  }

  let html='';
  if(critical.length) html+=`<div class="cn-sec-label crit">🔴 Critical (${critical.length})</div>${critical.map(makeCN).join('')}`;
  if(forced.length) html+=`<div class="cn-sec-label force">⚡ Forced (${forced.length})</div>${forced.map(makeCN).join('')}`;
  if(reduced.length) html+=`<div class="cn-sec-label red">Reduced (${reduced.length})</div>${reduced.map(makeCN).join('')}`;

  panel.innerHTML=html;

  // Click consequence node -> navigate to that set
  panel.querySelectorAll('[data-cn-nav]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.cn-cand-row')) return;
      const si=parseInt(el.dataset.cnNav);
      navigateTo('set',si,SETS[si].set);
    });
  });

  // Click candidate row in consequence -> navigate to that specific decision
  panel.querySelectorAll('.cn-cand-row[data-cn-si]').forEach(el=>{
    el.addEventListener('click',()=>{
      const si=parseInt(el.dataset.cnSi);
      const pn=el.dataset.cnPn;
      navigateTo('set',si,SETS[si].set);
      // After navigating to the set, highlight that candidate
      setTimeout(()=>{
        activeCandKey={setIdx:si,playerName:pn,tier:el.dataset.cnTier};
        renderConseq({setIdx:si,playerName:pn,tier:el.dataset.cnTier});
        renderDecPanel_Set(si);
      },50);
    });
  });
}

// ── STATUS BAR ──
function renderStatus(){
  const tot=Object.keys(locks).length;
  const vsTotal=SETS.filter(s=>isVS(s)).length;
  const vsLocked=SETS.filter((s,i)=>isVS(s)&&locks[i]).length;
  const top50=Object.keys(PI).filter(n=>(PI[n][0]?.war_rank||9999)<=50);
  const top50p=top50.filter(n=>lockedPlayers[n]!==undefined).length;
  const crit=SETS.filter((_,i)=>getSetStatus(i)==='critical').length;
  const strand=Object.keys(PI).filter(n=>getPlayerStatus(n)==='stranded').length;

  document.getElementById('st-locked').textContent=tot;
  document.getElementById('st-vs').textContent=vsLocked;
  document.getElementById('st-vs-tot').textContent=vsTotal;
  document.getElementById('st-top50').textContent=top50p;
  document.getElementById('st-top50-tot').textContent=top50.length;
  document.getElementById('st-crit').textContent=crit;
  document.getElementById('st-strand').textContent=strand;

  const lb=document.getElementById('st-locked');
  lb.className=tot>0?'g':'b';
  document.getElementById('st-crit').className=crit>0?'r':'g';
  document.getElementById('st-strand').className=strand>0?'r':'g';
}

function refreshAll(){
  renderStatus();
  renderSetsList();
  renderPlayersList();
  if(activeSetIdx!==null) renderDecPanel_Set(activeSetIdx);
  else if(activePlayerName!==null) renderDecPanel_Player(activePlayerName);
  if(activeCandKey) renderConseq(activeCandKey);
  // Re-render secondary if visible
  const sec=document.getElementById('dec-secondary');
  if(!sec.classList.contains('hidden') && activeCandKey){
    if(activeSetIdx!==null) renderSecondary_PlayerSets(activeCandKey.playerName, activeCandKey.setIdx);
    else if(activePlayerName!==null) renderSecondary_SetCands(activeCandKey.setIdx, activeCandKey.playerName);
  }
}

// ── WIRE CONTROLS ──
document.getElementById('undo-btn').addEventListener('click',undoLast);
document.getElementById('reset-btn').addEventListener('click',()=>{
  if(!confirm('Reset all?')) return;
  locks={}; lockedPlayers={}; skippedSets.clear(); skippedPlayers.clear(); history=[];
  navStack=[]; navPos=-1; activeSetIdx=null; activePlayerName=null; activeCandKey=null;
  document.getElementById('undo-btn').disabled=true;
  document.getElementById('dec-primary').innerHTML='<div class="dec-empty"><div class="dec-empty-icon">⚾</div><div style="color:#334155;font-size:0.78rem">Select a set or player to begin</div></div>';
  clearSecondary();
  document.getElementById('conseq-panel').innerHTML='<div style="color:#334155;font-size:0.7rem;padding:12px;text-align:center">Click a candidate to see consequences</div>';
  document.getElementById('dec-header-label').textContent='Select a set or player to begin';
  refreshAll();
});
document.getElementById('nav-back').addEventListener('click',navBack);
document.getElementById('nav-fwd').addEventListener('click',navFwd);

// Set filters
document.querySelectorAll('[data-sf]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-sf]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); setFilter=btn.dataset.sf; renderSetsList();
  });
});
// Player filters
document.querySelectorAll('[data-pf]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('[data-pf]').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); playerFilter=btn.dataset.pf; renderPlayersList();
  });
});

document.getElementById('sets-search').addEventListener('input',e=>{setsSearch=e.target.value;renderSetsList();});
document.getElementById('dec-divider-close').addEventListener('click',()=>{
  clearSecondary();
  document.getElementById('dec-primary').querySelectorAll('.cand-card').forEach(c=>c.classList.remove('cc-drilled'));
});
document.getElementById('players-search').addEventListener('input',e=>{playersSearch=e.target.value;renderPlayersList();});

// ── INIT ──
renderStatus();
renderSetsList();
renderPlayersList();
</script>
